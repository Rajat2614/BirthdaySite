<div class="relative flex min-h-screen w-full items-center justify-center overflow-hidden bg-[#F4C2C2]">

  <!-- Gift emojis bombarding the background -->
  <div class="pointer-events-none absolute inset-0 z-0">
    @for (g of gifts; track $index) {
      <span
        class="gift"
        [style.left.%]="g.left"
        [style.fontSize.px]="g.size"
        [style.animationDelay.s]="g.delay"
        [style.animationDuration.s]="g.duration"
        [style.--rot]="g.rotate + 'deg'">
        {{ g.emoji }}
      </span>
    }
  </div>

  <!-- Question pop-up (keyed by currentKey so it re-animates each step) -->
  <div class="relative z-10 w-full max-w-md">
    @for (key of [currentKey]; track key) {
      <div class="pop rounded-3xl bg-white/95 p-8 text-center shadow-2xl ring-1 ring-white/40 backdrop-blur md:p-10"
           [class.pop--final]="current.final">

        <div class="mb-4 text-6xl" [class.bounce-emoji]="current.final">{{ current.emoji }}</div>

        <h1 class="text-2xl font-extrabold leading-snug text-slate-800 md:text-3xl">
          {{ current.text }}
        </h1>

        @if (current.sub) {
          <p class="mt-3 text-base text-slate-500">{{ current.sub }}</p>
        }

        <div class="mt-8 flex flex-col gap-3">
          @for (b of current.buttons; track b.label) {
            <button
              type="button"
              (click)="pick(b.next)"
              [class.btn-primary]="b.style !== 'ghost'"
              [class.btn-ghost]="b.style === 'ghost'"
              class="w-full rounded-xl py-3 text-lg font-bold shadow-lg transition hover:scale-[1.03]">
              {{ b.label }}
            </button>
          }
        </div>
      </div>
    }

    <!-- Navigation -->
    <div class="mt-6 flex items-center justify-center gap-4 text-sm font-semibold text-white/90">
      <a routerLink="/timeline" class="hover:underline">&larr; Back to timeline</a>
      <span class="text-white/40">•</span>
      <a routerLink="/" class="hover:underline">Back to start</a>
    </div>
  </div>
</div>
